version: '3.8'

services:
  # 1. Veritabanı Servisi (SQL Server)
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: minilms_db_v2
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Admin123_Secure!
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Admin123_Secure!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Veritabanı Otomatik Kurulum Servisi
  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: minilms_db_init_v2
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db-init:/scripts
    command: /bin/bash -c "/opt/mssql-tools/bin/sqlcmd -S db -U sa -P 'Admin123_Secure!' -d master -i /scripts/setup.sql"

  # 3. FastAPI Backend Servisi
  web:
    build: .
    container_name: minilms_backend_v2
    ports:
      - "8000:8000"
    environment:
      - DB_URL=mssql+pyodbc://sa:Admin123_Secure!@db:1433/obs?driver=ODBC+Driver+17+for+SQL+Server
      - JWT_SECRET_KEY=v2_deneme_basliyor_cok_gizli_anahtar_999
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    depends_on:
      db:
        condition: service_healthy
